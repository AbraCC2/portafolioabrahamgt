<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Abraham</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Syne', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            background: radial-gradient(circle at center, #D30000 0%, #a80000 100%);
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            z-index: 200;
            mix-blend-mode: difference;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo-btn { cursor: pointer; font-weight: 800; text-transform: lowercase; font-size: 18px; }

        .nav-btn {
            text-decoration: none;
            color: white;
            font-size: 12px;
            font-weight: 700;
            text-transform: lowercase;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            background: transparent;
        }

        /* MASTER SWITCH */
        .master-switch-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            width: 90%;
            max-width: 850px;
        }

        .switch-track {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 300px;
            display: flex;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .switch-option {
            flex: 1;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .switch-option span {
            text-transform: lowercase;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            opacity: 0.3;
            display: inline-block; /* Importante para la rotación inversa */
        }

        .selector-pill {
            position: absolute;
            width: calc(50% - 18px);
            height: calc(100% - 36px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 300px;
            top: 18px;
            left: 18px;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* CONTENIDO */
        .main-content {
            width: 100%;
            display: none;
            padding: 160px 60px 100px 60px; 
            opacity: 0;
            min-height: 100vh;
        }

        .section-view {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .active-view { display: grid; }

        /* CARDS */
        .post-card {
            background: rgba(255,255,255,0.03); 
            aspect-ratio: 4 / 5; 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .post-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .navbar { padding: 20px; }
            .nav-left { gap: 8px; }
            .logo-btn { font-size: 16px; }
            
            /* Separación para que el copyright no pegue a planes */
            .copyright-text {
                margin-left: 10px;
                font-size: 7px !important;
            }

            .nav-btn { font-size: 10px; padding: 6px 12px; }

            /* Switch Inicial más grande */
            .master-switch-container { 
                width: 85%; 
            }
            .switch-track { 
                height: 100px; /* Más robusto */
                border-radius: 50px; 
            }
            .switch-option span { 
                font-size: 18px; 
                letter-spacing: 1px; 
            }
            .selector-pill { 
                width: calc(50% - 12px); 
                height: calc(100% - 24px); 
                top: 12px; 
                left: 12px; 
            }

            .main-content { padding: 100px 15px 180px 15px; }
            .section-view { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-btn" id="reset-home">abraham</div>
            <a href="https://wa.me/529987684125" target="_blank" class="nav-btn">contacto</a>
            <button class="nav-btn" id="btn-show-planes">planes</button>
        </div>
        <div class="copyright-text" style="font-weight: 700; opacity: 0.3; font-size: 8px; text-transform: lowercase;">portfolio © 2026</div>
    </nav>

    <div class="master-switch-container" id="master-switch">
        <div class="switch-track">
            <div class="selector-pill" id="pill"></div>
            <div class="switch-option" id="btn-design"><span class="txt-inner">diseños</span></div>
            <div class="switch-option" id="btn-photos"><span class="txt-inner">fotos</span></div>
        </div>
    </div>

    <main class="main-content" id="main-content">
        <div class="section-view" id="view-design"></div>
        <div class="section-view" id="view-photos"></div>
        <div class="section-view" id="view-planes">
            <div style="text-align: center; padding: 40px 0;">
                <h2 style="text-transform: lowercase; font-size: 30px;">próximamente planes</h2>
            </div>
        </div>
    </main>

    <script>
        const pill = document.getElementById('pill');
        const masterSwitch = document.getElementById('master-switch');
        const mainContent = document.getElementById('main-content');
        const texts = document.querySelectorAll('.txt-inner');
        const isMobile = window.innerWidth <= 768;

        // INICIO: Vertical, pero texto nivelado horizontalmente
        if (isMobile) {
            gsap.set(masterSwitch, { rotation: 90, scale: 1.2 });
            gsap.set(texts, { rotation: -90 }); // Rotación inversa para leer horizontal
        }

        function initGallery() {
            const design = document.getElementById('view-design');
            const photos = document.getElementById('view-photos');
            for (let i = 1; i <= 12; i++) design.innerHTML += `<div class="post-card"><img src="diseño${i}.jpg"></div>`;
            for (let i = 1; i <= 8; i++) photos.innerHTML += `<div class="post-card"><img src="foto${i}.jpg"></div>`;
        }
        initGallery();

        function showView(type) {
            const isMobileView = window.innerWidth <= 768;

            if(!mainContent.style.display || mainContent.style.display === 'none') {
                // ANIMACIÓN AL ACTIVAR
                gsap.to(masterSwitch, { 
                    top: isMobileView ? "calc(100% - 80px)" : "calc(100% - 90px)", 
                    rotation: 0, 
                    scale: isMobileView ? 0.95 : 0.5, // Un poco más grande en móvil al navegar
                    duration: 1.2, 
                    ease: "expo.inOut" 
                });

                if(isMobileView) {
                    gsap.to(texts, { rotation: 0, duration: 1.2, ease: "expo.inOut" });
                }

                mainContent.style.display = 'block';
                gsap.fromTo(mainContent, { opacity: 0 }, { opacity: 1, duration: 0.6, delay: 0.5 });
            }

            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`view-${type}`).classList.add('active-view');

            if(type === 'planes') {
                gsap.to(pill, { opacity: 0, duration: 0.3 });
            } else {
                gsap.to(pill, { opacity: 1, xPercent: type === 'design' ? 0 : 100, duration: 0.4 });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('btn-design').onclick = () => showView('design');
        document.getElementById('btn-photos').onclick = () => showView('photos');
        document.getElementById('btn-show-planes').onclick = () => showView('planes');

        document.getElementById('reset-home').onclick = () => {
            const isMobileView = window.innerWidth <= 768;
            gsap.to(mainContent, { opacity: 0, duration: 0.4, onComplete: () => mainContent.style.display = 'none' });
            
            gsap.to(masterSwitch, { 
                top: "50%", 
                rotation: isMobileView ? 90 : 0, 
                scale: isMobileView ? 1.2 : 1, 
                duration: 1.2, 
                ease: "expo.inOut" 
            });

            if(isMobileView) {
                gsap.to(texts, { rotation: -90, duration: 1.2, ease: "expo.inOut" });
            }
            
            gsap.to(pill, { xPercent: 0, opacity: 1 });
        };
    </script>
</body>
</html>
