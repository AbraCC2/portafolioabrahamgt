<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Abraham</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Syne', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            background: radial-gradient(circle at center, #D30000 0%, #a80000 100%);
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            z-index: 200;
            mix-blend-mode: difference;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo-btn { cursor: pointer; font-weight: 800; text-transform: lowercase; font-size: 18px; }

        .nav-btn {
            text-decoration: none;
            color: white;
            font-size: 12px;
            font-weight: 700;
            text-transform: lowercase;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            background: transparent;
        }

        /* MASTER SWITCH */
        .master-switch-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            width: 90%;
            max-width: 850px;
            /* Estado inicial vertical en móviles se maneja por JS/GSAP */
        }

        .switch-track {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 300px;
            display: flex;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .switch-option {
            flex: 1;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .switch-option span {
            text-transform: lowercase;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            opacity: 0.3;
        }

        .selector-pill {
            position: absolute;
            width: calc(50% - 18px);
            height: calc(100% - 36px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 300px;
            top: 18px;
            left: 18px;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* CONTENIDO */
        .main-content {
            width: 100%;
            display: none;
            padding: 160px 60px 100px 60px; 
            opacity: 0;
            min-height: 100vh;
        }

        .section-view {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .active-view { display: grid; }

        /* CARDS */
        .post-card {
            background: rgba(255,255,255,0.03); 
            aspect-ratio: 4 / 5; 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .post-card img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-card { display: flex; align-items: center; justify-content: center; text-align: center; border: 2px dashed rgba(255,255,255,0.2); padding: 15px; }
        .placeholder-card span { font-size: 14px; opacity: 0.4; text-transform: lowercase; }

        /* PLANES */
        .planes-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .plan-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            backdrop-filter: blur(10px);
        }
        .plan-card h2 { font-size: 24px; margin-bottom: 15px; text-transform: lowercase; }
        .plan-card .price { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .plan-card .desc { font-size: 13px; opacity: 0.7; margin-bottom: 20px; line-height: 1.4; }
        .hire-btn { display: inline-block; text-decoration: none; background: white; color: black; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 13px; text-transform: lowercase; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .navbar { padding: 20px; }
            .logo-btn { font-size: 16px; }
            .nav-btn { font-size: 10px; padding: 6px 12px; }

            /* Switch Inicial Vertical */
            .master-switch-container { 
                width: 70%; /* Un poco más estrecho para que el giro vertical no choque */
            }
            .switch-track { height: 70px; border-radius: 100px; }
            .switch-option span { font-size: 14px; letter-spacing: 1px; }
            .selector-pill { 
                width: calc(50% - 10px); 
                height: calc(100% - 20px); 
                top: 10px; 
                left: 10px; 
            }

            .main-content { padding: 100px 15px 150px 15px; }
            .section-view { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .planes-grid { display: block; }
            .plan-card { min-width: 100%; margin-bottom: 15px; padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-btn" id="reset-home">abraham</div>
            <a href="https://wa.me/529987684125" target="_blank" class="nav-btn">contacto</a>
            <button class="nav-btn" id="btn-show-planes">planes</button>
        </div>
        <div style="font-weight: 700; opacity: 0.3; font-size: 8px; text-transform: lowercase;">portfolio © 2026</div>
    </nav>

    <div class="master-switch-container" id="master-switch">
        <div class="switch-track">
            <div class="selector-pill" id="pill"></div>
            <div class="switch-option" id="btn-design"><span>diseños</span></div>
            <div class="switch-option" id="btn-photos"><span>fotos</span></div>
        </div>
    </div>

    <main class="main-content" id="main-content">
        <div class="section-view" id="view-design"></div>
        <div class="section-view" id="view-photos"></div>
        <div class="section-view" id="view-planes">
            <div class="planes-grid">
                <div class="plan-card">
                    <h2>landing page</h2>
                    <div class="price">$3,899 <small>MXN</small></div>
                    <p class="desc">Tu marca en una sola página. Diseño de alto impacto enfocado en conversión.</p>
                    <a href="https://wa.me/529987684125" class="hire-btn">quiero mi página</a>
                </div>
                <div class="plan-card">
                    <h2>diseño ilimitado</h2>
                    <div class="price">$5,599 <small>MXN/mes</small></div>
                    <p class="desc">Todos los diseños que necesites en un flujo constante de trabajo.</p>
                    <a href="https://wa.me/529987684125" class="hire-btn">quiero contratar</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const pill = document.getElementById('pill');
        const masterSwitch = document.getElementById('master-switch');
        const mainContent = document.getElementById('main-content');
        const isMobile = window.innerWidth <= 768;

        // ESTADO INICIAL: Si es móvil, rotar 90 grados
        if (isMobile) {
            gsap.set(masterSwitch, { rotation: 90 });
        }

        function initGallery() {
            const design = document.getElementById('view-design');
            const photos = document.getElementById('view-photos');
            for (let i = 1; i <= 18; i++) design.innerHTML += `<div class="post-card"><img src="diseño${i}.jpg"></div>`;
            design.innerHTML += `<div class="post-card placeholder-card"><span>aquí podría estar el tuyo</span></div>`;
            for (let i = 1; i <= 9; i++) photos.innerHTML += `<div class="post-card"><img src="foto${i}.jpg"></div>`;
        }
        initGallery();

        function showView(type) {
            const isMobileView = window.innerWidth <= 768;

            if(!mainContent.style.display || mainContent.style.display === 'none') {
                // ANIMACIÓN DE DESPIERTE
                const targetTop = isMobileView ? "calc(100% - 70px)" : "calc(100% - 90px)";
                const targetScale = isMobileView ? 0.9 : 0.5;

                gsap.to(masterSwitch, { 
                    top: targetTop, 
                    rotation: 0, // Regresa a horizontal
                    scale: targetScale, 
                    duration: 1.2, 
                    ease: "expo.inOut" 
                });

                mainContent.style.display = 'block';
                gsap.fromTo(mainContent, { opacity: 0 }, { opacity: 1, duration: 0.6, delay: 0.5 });
            }

            // Lógica de cambio de vista
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            const target = document.getElementById(`view-${type}`);
            target.classList.add('active-view');

            if(type === 'planes') {
                gsap.to(pill, { opacity: 0, duration: 0.3 });
            } else {
                gsap.to(pill, { opacity: 1, xPercent: type === 'design' ? 0 : 100, duration: 0.4 });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('btn-design').onclick = () => showView('design');
        document.getElementById('btn-photos').onclick = () => showView('photos');
        document.getElementById('btn-show-planes').onclick = () => showView('planes');

        // BOTÓN ABRAHAM: Regresa todo al inicio
        document.getElementById('reset-home').onclick = () => {
            const isMobileView = window.innerWidth <= 768;
            
            // Ocultar contenido
            gsap.to(mainContent, { opacity: 0, duration: 0.4, onComplete: () => {
                mainContent.style.display = 'none';
            }});

            // Regresar Switch al centro y rotar si es móvil
            gsap.to(masterSwitch, { 
                top: "50%", 
                rotation: isMobileView ? 90 : 0, 
                scale: 1, 
                duration: 1.2, 
                ease: "expo.inOut" 
            });
            
            // Reset de la pastilla
            gsap.to(pill, { xPercent: 0, opacity: 1 });
        };
    </script>
</body>
</html>
