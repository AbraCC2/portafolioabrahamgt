<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Abraham</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Syne', sans-serif;
        }

        body, html {
            width: 100%;
            background: radial-gradient(circle at center, #D30000 0%, #a80000 100%);
            background-attachment: fixed;
            color: white;
            /* Quitamos overflow hidden para que el scroll funcione en móviles */
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            z-index: 200;
            mix-blend-mode: difference;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-btn {
            cursor: pointer;
            font-weight: 800;
            text-transform: lowercase;
            letter-spacing: 1px;
            font-size: 18px;
        }

        .nav-btn {
            text-decoration: none;
            color: white;
            font-size: 12px;
            font-weight: 700;
            text-transform: lowercase;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            cursor: pointer;
            background: transparent;
        }

        /* MASTER SWITCH */
        .master-switch-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            width: 90%;
            max-width: 850px;
        }

        .switch-track {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 300px;
            display: flex;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .switch-option span {
            text-transform: lowercase;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            opacity: 0.3;
        }

        .selector-pill {
            position: absolute;
            width: calc(50% - 18px);
            height: calc(100% - 36px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 300px;
            top: 18px;
            left: 18px;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            width: 100%;
            display: none;
            padding: 160px 60px 100px 60px; 
            opacity: 0;
            min-height: 100vh;
        }

        .section-view {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .active-view { display: grid; }

        /* PLANES */
        .planes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            flex: 1;
            min-width: 320px;
            max-width: 380px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .plan-card h2 { font-size: 32px; margin-bottom: 20px; text-transform: lowercase; }
        .plan-card .price { font-size: 40px; font-weight: 800; margin-bottom: 10px; }
        .plan-card .desc { font-size: 14px; opacity: 0.8; margin-bottom: 25px; line-height: 1.5; }

        .hire-btn {
            display: inline-block;
            text-decoration: none;
            background: white;
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: lowercase;
        }

        /* GALERIA CARDS */
        .post-card {
            background: rgba(255,255,255,0.03); 
            aspect-ratio: 4 / 5; 
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .post-card img { width: 100%; height: 100%; object-fit: cover; }

        .placeholder-card {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px dashed rgba(255,255,255,0.2);
        }

        .placeholder-card span { font-size: 16px; opacity: 0.4; text-transform: lowercase; }

        /* --- RESPONSIVE MOBILE FIX --- */
        @media (max-width: 768px) {
            .navbar {
                padding: 20px;
            }
            
            .nav-left { gap: 5px; }
            .logo-btn { font-size: 14px; margin-right: 5px; }
            .nav-btn { font-size: 9px; padding: 6px 10px; }

            .master-switch-container {
                width: 90%;
            }

            .switch-track {
                height: 70px;
            }

            .switch-option span { font-size: 14px; letter-spacing: 1px; }

            .main-content {
                padding: 100px 15px 150px 15px; /* Más padding abajo para que el switch no tape nada */
                overflow-y: visible; /* Permitir scroll natural */
            }

            .section-view {
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
                gap: 10px;
            }

            .planes-grid {
                display: block; /* Cambio de flex a block para scroll vertical puro */
            }

            .plan-card {
                min-width: 100%;
                margin-bottom: 20px; /* Espacio entre planes */
                padding: 30px 20px;
            }

            .plan-card h2 { font-size: 22px; }
            .plan-card .price { font-size: 28px; }
        }

    </style>
</head>
